update_alarm:
  name: Update Alarm
  description: Update an existing alarm on the HaWake device.
  fields:
    device_name:
      name: Device Name
      description: "The HaWake device name. Optional if only one device is configured — auto-resolved."
      required: false
      selector:
        text:
    index:
      name: Alarm Index
      description: The alarm index to update (1-based).
      required: true
      selector:
        number:
          min: 1
          max: 50
          step: 1
    time:
      name: Time
      description: "New alarm time in HH:mm format."
      selector:
        time:
    label:
      name: Label
      selector:
        text:
    enabled:
      name: Enabled
      selector:
        boolean:
    days:
      name: Days
      description: "Comma-separated days or empty for one-time."
      selector:
        text:
    sound:
      name: Sound
      selector:
        text:
    volume:
      name: Volume
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
    vibrate:
      name: Vibrate
      selector:
        boolean:
    fade_in:
      name: Fade In
      selector:
        number:
          min: 0
          max: 60
          step: 1
          unit_of_measurement: min
    snooze_limit:
      name: Snooze Limit
      selector:
        number:
          min: 0
          max: 99
          step: 1
    snooze_interval:
      name: Snooze Interval
      selector:
        number:
          min: 1
          max: 60
          step: 1
          unit_of_measurement: min
    mission:
      name: Mission
      selector:
        select:
          options:
            - none
            - shake
            - math
            - home_assistant
            - alert
    notes:
      name: Notes
      selector:
        text:
          multiline: true

trigger_alert:
  name: Trigger Alert
  description: Trigger a full-screen alert on the HaWake device.
  fields:
    device_name:
      name: Device Name
      description: "The HaWake device name. Optional if only one device is configured — auto-resolved."
      required: false
      selector:
        text:
    message:
      name: Message
      description: Alert message to display.
      required: true
      selector:
        text:
    title:
      name: Title
      description: Optional alert title.
      selector:
        text:
    sound:
      name: Sound
      description: Alert sound name.
      selector:
        text:
    volume:
      name: Volume
      description: Alert volume (0-100).
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
    media_url:
      name: Media URL
      description: Audio URL to play during the alert.
      selector:
        text:
    image_url:
      name: Image URL
      description: Image to display on the alert screen.
      selector:
        text:
    video_url:
      name: Video URL
      description: Video to display on the alert screen.
      selector:
        text:
    link_url:
      name: Link URL
      description: URL to open when tapping the alert.
      selector:
        text:

dismiss:
  name: Dismiss Alarm
  description: Dismiss the currently active alarm.
  fields:
    device_name:
      name: Device Name
      description: "The HaWake device name. Optional if only one device is configured — auto-resolved."
      required: false
      selector:
        text:

snooze:
  name: Snooze Alarm
  description: Snooze the currently active alarm.
  fields:
    device_name:
      name: Device Name
      description: "The HaWake device name. Optional if only one device is configured — auto-resolved."
      required: false
      selector:
        text:

skip:
  name: Skip Alarm
  description: Skip the next upcoming alarm.
  fields:
    device_name:
      name: Device Name
      description: "The HaWake device name. Optional if only one device is configured — auto-resolved."
      required: false
      selector:
        text:

